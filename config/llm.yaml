# LLM routing config
# Maps runtime routes to provider/model profiles.

version: 1

providers:
  anthropic_main:
    type: anthropic
    api_key_env: ANTHROPIC_API_KEY
    timeout_seconds: 30

  # Local semantic/embedding tasks. No tool use.
  ollama_specialist:
    type: openai_compatible
    base_url: http://127.0.0.1:11434/v1
    api_key: ollama
    timeout_seconds: 90
    supports_tool_use: false

profiles:
  # Conversational — what Mike actually talks to. Don't cheap out.
  respond_sonnet:
    provider: anthropic_main
    model: claude-sonnet-4-6

  # Background tasks — classification, summarization, structured output.
  # Haiku is fast, cheap, and plenty capable for these.
  background_haiku:
    provider: anthropic_main
    model: claude-haiku-4-5-20251001

  # Local semantic maintenance.
  ollama_semantic:
    provider: ollama_specialist
    model: qwen3-coder:30b-a3b-q4_K_M

routes:
  brain.respond:
    profile: respond_sonnet
    required: true

  brain.triage:
    profile: background_haiku
    required: true

  brain.prioritize:
    profile: background_haiku
    required: true

  cortex.bulletin:
    profile: background_haiku
    required: true

  cortex.semantic:
    profile: ollama_semantic
    required: true

  cortex.observations:
    profile: background_haiku
    required: true

  coder.worker:
    profile: respond_sonnet
    required: false

startup:
  verify_required_routes: true
  warmup_routes:
    - brain.respond
    - brain.triage
    - cortex.semantic
